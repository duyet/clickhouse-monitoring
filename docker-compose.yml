services:
  clickhouse:
    image: ghcr.io/duyet/docker-images:clickhouse_25.1
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/?query=SELECT%201"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 5s
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: 1

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_REF: local
        GITHUB_SHA: local-build
    ports:
      - "3000:3000"
    # Optional single-source env file: `cp apps/dashboard/.env.example .env` and
    # set CHM_AUTH_PROVIDER, feature flags, LLM keys, etc. — the SAME var names as
    # the Cloudflare/Helm deploys. `required: false` so the quick-start works with
    # no file. The `environment:` block below wins, keeping the bundled ClickHouse
    # service wired; override CLICKHOUSE_* in `.env` to point at your own host.
    env_file:
      - path: .env
        required: false
    environment:
      CLICKHOUSE_HOST: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      PORT: 3000
      HOST: "0.0.0.0"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
