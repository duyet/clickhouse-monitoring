# wrangler.toml for the chmonitor documentation worker.
#
# Static-assets-only Worker: Astro builds to ./dist, served directly by Workers
# ASSETS (no `main` script). All pages are pre-rendered HTML at build time.
#
# Deploy: cd apps/docs && bun run build && wrangler deploy

name = "chmonitor-docs"
compatibility_date = "2026-05-28"

[assets]
directory = "./dist"
# Serve /getting-started from dist/getting-started/index.html without a 307 to
# /getting-started/ — avoids an extra edge round-trip on every bare-path link.
html_handling = "drop-trailing-slash"

[[routes]]
pattern = "docs.chmonitor.dev"
custom_domain = true

# Preview environment for PR deployments. Mirrors production topology: docs prod
# is docs.chmonitor.dev, so its preview is preview.docs.chmonitor.dev. Routes are
# not inherited by named environments, so the custom domain must be declared
# explicitly here. On the first deploy Wrangler provisions DNS + TLS
# automatically (chmonitor.dev zone must be in the same account).
[env.preview]
name = "preview-chmonitor-docs"

[env.preview.assets]
directory = "./dist"
html_handling = "drop-trailing-slash"

[[env.preview.routes]]
pattern = "preview.docs.chmonitor.dev"
custom_domain = true
