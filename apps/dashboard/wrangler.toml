# wrangler.toml — chmonitor TanStack Start dashboard worker.
#
# `main` resolves the built-in TanStack Start server entry from node_modules;
# the @cloudflare/vite-plugin produces the worker bundle + client asset
# manifest at build time, so no explicit [assets] block is required.
#
# Public defaults only — real hosts/users are injected per-environment at deploy time via CI secrets.

name = "chmonitor-dash"
main = "@tanstack/react-start/server-entry"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[observability]
enabled = true

# D1 database for AI agent conversations
[[d1_databases]]
binding = "CONVERSATIONS_D1"
database_name = "clickhouse-monitor-conversations"
migrations_dir = "./src/db/conversations-migrations"

# Durable Object migrations.
# The legacy Next.js worker (same name, chmonitor-dash) registered two SQLite
# Durable Objects: DOQueueHandler (OpenNext queue) and AgentConversationDurableObject
# (agent chat history). The TanStack Start app uses neither — conversations now
# live in CONVERSATIONS_D1 — so deploying over the existing worker requires an
# explicit delete-class migration (Cloudflare refuses to silently drop a DO).
# v1/v2 are the legacy worker's already-applied history (kept so wrangler can
# sequence v3 after them); v3 removes both classes.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

[[migrations]]
tag = "v2-agent-conversations"
new_sqlite_classes = ["AgentConversationDurableObject"]

[[migrations]]
tag = "v3-drop-legacy-next-dos"
deleted_classes = ["DOQueueHandler", "AgentConversationDurableObject"]

# ─────────────────────────────────────────────────────────────────────────────
# Production: custom domain for the dashboard. The TanStack Start app is now the
# official dashboard, having replaced the legacy Next.js app (#1392).
# ─────────────────────────────────────────────────────────────────────────────
[[routes]]
pattern = "dash.chmonitor.dev"
custom_domain = true

[vars]
CLICKHOUSE_HOST = "http://localhost:8123"
CLICKHOUSE_USER = "default"
CLICKHOUSE_NAME = "localhost"
CLICKHOUSE_MAX_EXECUTION_TIME = "60"
CLOUDFLARE_WORKERS = "1"
LLM_MODEL = "anyrouter:@preset/chmonitor"
OPENROUTER_REFERER = "https://chmonitor.dev"
OPENROUTER_APP_NAME = "chmonitor"
# Server-side auth provider (runtime). The CLIENT auth provider + Clerk
# publishable key are NOT runtime vars — they are build-time inlined via
# import.meta.env.VITE_* (see vite.config.ts CLIENT_ENV).
CHM_AUTH_PROVIDER = "clerk"
CHM_FEATURE_AGENT_ACCESS = "authenticated"
# Public read-only mode: anonymous visitors can view monitoring data; writes
# (AI agent, KILL QUERY / OPTIMIZE TABLE, arbitrary SQL) still require sign-in.
CHM_CLERK_PUBLIC_READ = "true"
# Cloud (SaaS) mode: this is the hosted product. Env CLICKHOUSE_HOST is a PUBLIC
# read-only DEMO; signed-in users get a clean per-user workspace and connect
# their own host. Self-hosted/OSS deployments leave this UNSET (→ env hosts are
# the operator's real hosts, full access). The build also needs VITE_CLOUD_MODE
# inlined (set in the CI/deploy build step). See lib/cloud/cloud-mode.ts.
CHM_CLOUD_MODE = "true"

# AgentState conversation-store backend. The AGENTSTATE_API_KEY secret (set via
# set-secrets.ts) alone activates it — resolveStore picks AgentState ahead of the
# D1 binding on key presence, so no force var is set (forcing would make
# resolveStore throw in keyless envs). AGENTSTATE_AI_ENRICH turns on auto-titles +
# follow-up suggestions. Base URL defaults to agentstate.app/api.
AGENTSTATE_AI_ENRICH = "true"

# ─────────────────────────────────────────────────────────────────────────────
# Reverse-proxy auth (EXAMPLE — not active; the dashboard uses `clerk` above).
# Set CHM_AUTH_PROVIDER = "proxy" to authenticate requests via a trusted proxy.
# Two mechanisms; either success authenticates a request:
#
#   (a) Cloudflare Access — verifies the signed `Cf-Access-Jwt-Assertion` JWT.
#       CHM_CF_ACCESS_TEAM_DOMAIN is your Access team URL; CHM_CF_ACCESS_AUD is
#       the Access application AUD tag.
#   (b) Trusted identity header — read CHM_PROXY_AUTH_HEADER (default
#       `X-Forwarded-User`) ONLY when the request also presents the shared
#       secret `CHM_PROXY_AUTH_SECRET` (set via `wrangler secret put`, never a
#       plaintext var). Without the secret, header trust is disabled because any
#       client could forge it on a publicly-reachable worker.
#
# CHM_AUTH_PROVIDER = "proxy"
# CHM_CF_ACCESS_TEAM_DOMAIN = "https://your-team.cloudflareaccess.com"
# CHM_CF_ACCESS_AUD = "<access-application-aud-tag>"
# CHM_PROXY_AUTH_HEADER = "X-Forwarded-User"
# CHM_PROXY_AUTH_SECRET via: wrangler secret put CHM_PROXY_AUTH_SECRET

# ─────────────────────────────────────────────────────────────────────────────
# Preview environment for PR deployments
# Deployed by GitHub Actions on pull requests (see .github/workflows/cloudflare.yml)
# and reachable at https://preview.dash.chmonitor.dev.
# Inherits most top-level settings; vars require explicit declaration.
#
# One-time setup required:
#   wrangler secret put CLICKHOUSE_PASSWORD --env preview
# ─────────────────────────────────────────────────────────────────────────────
[env.preview]
name = "preview-chmonitor-dash"

# Custom domain for the preview worker.
[[env.preview.routes]]
pattern = "preview.dash.chmonitor.dev"
custom_domain = true

# Reuse the same conversation D1 database once database_id is provisioned
[[env.preview.d1_databases]]
binding = "CONVERSATIONS_D1"
database_name = "clickhouse-monitor-conversations"
migrations_dir = "./src/db/conversations-migrations"

# DO migrations are not inherited by named environments — repeat the chain that
# drops the legacy preview worker's Durable Objects (see top-level note).
[[env.preview.migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

[[env.preview.migrations]]
tag = "v2-agent-conversations"
new_sqlite_classes = ["AgentConversationDurableObject"]

[[env.preview.migrations]]
tag = "v3-drop-legacy-next-dos"
deleted_classes = ["DOQueueHandler", "AgentConversationDurableObject"]

# Vars must be explicitly set per environment (not inherited from top-level)
[env.preview.vars]
CLICKHOUSE_HOST = "http://localhost:8123"
CLICKHOUSE_USER = "default"
CLICKHOUSE_NAME = "localhost"
CLICKHOUSE_MAX_EXECUTION_TIME = "60"
CLOUDFLARE_WORKERS = "1"
LLM_MODEL = "anyrouter:z-ai/glm-4.7-flash"
OPENROUTER_REFERER = "https://chmonitor.dev"
OPENROUTER_APP_NAME = "chmonitor"

# Server-side auth provider for preview (runtime). Client auth provider + the
# Clerk publishable key are build-time inlined (import.meta.env.VITE_*); the CI
# build step sets the pk_test key for preview deploys.
CHM_AUTH_PROVIDER = "clerk"
CHM_FEATURE_AGENT_ACCESS = "authenticated"
CHM_CLERK_PUBLIC_READ = "true"
# Preview mirrors the hosted product: cloud (SaaS) mode on. See production note.
CHM_CLOUD_MODE = "true"

# AgentState conversation-store backend. Preview only persists to AgentState if a
# separate AGENTSTATE_API_KEY_TEST secret is provided (see set-secrets.ts) — it
# does NOT reuse the prod key, keeping preview conversations out of the prod
# project. Without a test key, preview gracefully falls back (no force var).
AGENTSTATE_AI_ENRICH = "true"
