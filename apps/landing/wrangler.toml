# wrangler.toml for the chmonitor marketing landing worker.
#
# Static-assets-only Worker: Astro builds to ./dist, which is served directly
# by Workers Assets (no `main` script). public/_redirects (copied into dist)
# sends /docs* to docs.chmonitor.dev.
#
# Deploy: cd apps/landing && bun run build && wrangler deploy
#
# Note: the chmonitor.dev apex is a custom domain. It currently lives on the
# legacy worker; the live cutover detaches it there before the first deploy
# here claims it (custom domains are exclusive).

name = "chmonitor-landing"
compatibility_date = "2026-05-28"

[assets]
directory = "./dist"

[[routes]]
pattern = "chmonitor.dev"
custom_domain = true

# Preview environment for PR deployments. Mirrors production topology: landing
# prod is the chmonitor.dev apex, so its preview is the preview.chmonitor.dev
# apex-preview. Routes are not inherited by named environments, so the custom
# domain must be declared explicitly here. On the first deploy Wrangler
# provisions DNS + TLS automatically (chmonitor.dev zone must be in the same
# account). preview.chmonitor.dev was previously held by preview-chmonitor-dash;
# that binding is detached during cutover before landing claims it (custom
# domains are exclusive).
[env.preview]
name = "preview-chmonitor-landing"

[env.preview.assets]
directory = "./dist"

[[env.preview.routes]]
pattern = "preview.chmonitor.dev"
custom_domain = true
