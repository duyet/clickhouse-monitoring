# Default values for chmonitor.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/duyet/chmonitor
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

# Pod-level security context. Runs as the non-root "app" user (uid/gid 1001)
# baked into the Docker runner stage.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

# Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000

# Container port the app listens on (matches PORT=3000 in the Docker image).
containerPort: 3000

# Kubernetes health probes. Defaults match the container's health endpoints:
#   liveness  -> GET /healthz     (static 200 while the Node/worker process is up)
#   readiness -> GET /api/healthz (200 only when every configured ClickHouse host
#                                 answers its SELECT 1 ping; 503 otherwise)
#   startup   -> GET /healthz     (~60s grace before liveness can kill a slow boot)
# Paths rarely need changing; the thresholds are exposed so tight-resource nodes
# can tune without forking the chart into raw manifests. Keep
# readiness.timeoutSeconds ABOVE the app's per-host ping timeout
# (CHM_HEALTHZ_TIMEOUT_MS, default 3000ms in /api/healthz) or a slow ClickHouse
# host will flap readiness.
probes:
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /api/healthz
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3
  startup:
    enabled: true
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 12

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chmonitor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ClickHouse connection. Each value is comma-separated to support multiple hosts;
# position i across host/user/name maps to the same host index.
clickhouse:
  # Comma-separated ClickHouse host URLs (required).
  host: "http://localhost:8123"
  # Comma-separated usernames.
  user: "default"
  # Comma-separated passwords. Stored in a Secret rendered by this chart.
  password: ""
  # Query timeout in seconds (CLICKHOUSE_MAX_EXECUTION_TIME).
  maxExecutionTime: "60"
  # Use an existing Secret for the ClickHouse password instead of `clickhouse.password`.
  # The secret must contain a key named `CLICKHOUSE_PASSWORD`.
  existingSecret: ""

# Extra environment variables injected into the container, e.g.
# extraEnv:
#   - name: CLICKHOUSE_NAME
#     value: "prod"
extraEnv: []

nodeSelector: {}
tolerations: []
affinity: {}
