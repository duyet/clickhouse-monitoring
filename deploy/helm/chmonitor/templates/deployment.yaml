apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chmonitor.fullname" . }}
  labels:
    {{- include "chmonitor.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chmonitor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "chmonitor.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chmonitor.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "chmonitor.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chmonitor.fullname" . }}
                  key: CLICKHOUSE_HOST
            - name: CLICKHOUSE_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chmonitor.fullname" . }}
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_MAX_EXECUTION_TIME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chmonitor.fullname" . }}
                  key: CLICKHOUSE_MAX_EXECUTION_TIME
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chmonitor.secretName" . }}
                  key: CLICKHOUSE_PASSWORD
            {{- with .Values.auth }}
            {{- if .provider }}
            - name: CHM_AUTH_PROVIDER
              value: {{ .provider | quote }}
            {{- end }}
            {{- with .trusted }}
            {{- if .allowInsecure }}
            - name: CHM_TRUSTED_ALLOW_INSECURE
              value: "true"
            {{- end }}
            {{- if or .secret .existingSecret }}
            - name: CHM_TRUSTED_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "chmonitor.trustedSecretName" $ }}
                  key: CHM_TRUSTED_AUTH_SECRET
            {{- end }}
            {{- if .sharedSecretHeader }}
            - name: CHM_TRUSTED_SHARED_SECRET_HEADER
              value: {{ .sharedSecretHeader | quote }}
            {{- end }}
            {{- if .userHeader }}
            - name: CHM_TRUSTED_USER_HEADER
              value: {{ .userHeader | quote }}
            {{- end }}
            {{- if .emailHeader }}
            - name: CHM_TRUSTED_EMAIL_HEADER
              value: {{ .emailHeader | quote }}
            {{- end }}
            {{- if .nameHeader }}
            - name: CHM_TRUSTED_NAME_HEADER
              value: {{ .nameHeader | quote }}
            {{- end }}
            {{- if .avatarHeader }}
            - name: CHM_TRUSTED_AVATAR_HEADER
              value: {{ .avatarHeader | quote }}
            {{- end }}
            {{- if .groupsHeader }}
            - name: CHM_TRUSTED_GROUPS_HEADER
              value: {{ .groupsHeader | quote }}
            {{- end }}
            {{- if .roleHeader }}
            - name: CHM_TRUSTED_ROLE_HEADER
              value: {{ .roleHeader | quote }}
            {{- end }}
            {{- if .customHeaders }}
            - name: CHM_TRUSTED_CUSTOM_HEADERS
              value: {{ .customHeaders | quote }}
            {{- end }}
            {{- if .allowedGroups }}
            - name: CHM_TRUSTED_ALLOWED_GROUPS
              value: {{ .allowedGroups | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $key, $val := .Values.features }}
            {{- if $val }}
            - name: {{ $key }}
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chmonitor.fullname" $ }}
                  key: {{ $key }}
            {{- end }}
            {{- end }}
            {{- if .Values.auth.clerk.publishableKey }}
            - name: CHM_CLERK_PUBLISHABLE_KEY
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chmonitor.fullname" . }}
                  key: CHM_CLERK_PUBLISHABLE_KEY
            {{- end }}
            {{- if or .Values.auth.clerk.secretKey .Values.auth.clerk.existingSecret }}
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chmonitor.clerkSecretName" . }}
                  key: CLERK_SECRET_KEY
            {{- end }}
            {{- if or .Values.secrets.connectionsEncryptionKey .Values.secrets.existingSecret }}
            - name: CHM_CONNECTIONS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chmonitor.appSecretName" . }}
                  key: CHM_CONNECTIONS_ENCRYPTION_KEY
                  # optional so a partially-populated existingSecret (e.g. only the
                  # API key) doesn't crash the pod — the feature stays off instead.
                  optional: true
            {{- end }}
            {{- if or .Values.secrets.apiKeySecret .Values.secrets.existingSecret }}
            - name: CHM_API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "chmonitor.appSecretName" . }}
                  key: CHM_API_KEY_SECRET
                  optional: true
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.probes }}
          {{- if .startup.enabled }}
          # Startup probe gives the Nitro Node server up to ~60s to bind before
          # liveness kicks in. Prevents kill-loops on slow-start nodes.
          startupProbe:
            httpGet:
              path: {{ .startup.path | quote }}
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: {{ .startup.initialDelaySeconds }}
            periodSeconds: {{ .startup.periodSeconds }}
            timeoutSeconds: {{ .startup.timeoutSeconds }}
            failureThreshold: {{ .startup.failureThreshold }}
          {{- end }}
          {{- if .liveness.enabled }}
          # Static liveness: /healthz always returns 200 while the process is up.
          livenessProbe:
            httpGet:
              path: {{ .liveness.path | quote }}
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: {{ .liveness.initialDelaySeconds }}
            periodSeconds: {{ .liveness.periodSeconds }}
            timeoutSeconds: {{ .liveness.timeoutSeconds }}
            failureThreshold: {{ .liveness.failureThreshold }}
          {{- end }}
          {{- if .readiness.enabled }}
          # Readiness gates on ClickHouse reachability: /api/healthz returns 503
          # when no configured host is up (or a host's SELECT 1 ping times out).
          readinessProbe:
            httpGet:
              path: {{ .readiness.path | quote }}
              port: {{ $.Values.containerPort }}
            initialDelaySeconds: {{ .readiness.initialDelaySeconds }}
            periodSeconds: {{ .readiness.periodSeconds }}
            timeoutSeconds: {{ .readiness.timeoutSeconds }}
            failureThreshold: {{ .readiness.failureThreshold }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
