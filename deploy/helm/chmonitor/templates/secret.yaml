{{- $needsClickhouseSecret := not .Values.clickhouse.existingSecret }}
{{- $needsTrustedSecret := and .Values.auth.trusted.secret (not .Values.auth.trusted.existingSecret) }}
{{- $needsClerkSecret := and .Values.auth.clerk.secretKey (not .Values.auth.clerk.existingSecret) }}
{{- $needsConnectionsKey := and .Values.secrets.connectionsEncryptionKey (not .Values.secrets.existingSecret) }}
{{- $needsApiKeySecret := and .Values.secrets.apiKeySecret (not .Values.secrets.existingSecret) }}
{{- if or $needsClickhouseSecret $needsTrustedSecret $needsClerkSecret $needsConnectionsKey $needsApiKeySecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chmonitor.fullname" . }}
  labels:
    {{- include "chmonitor.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needsClickhouseSecret }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
  {{- end }}
  {{- if $needsTrustedSecret }}
  CHM_TRUSTED_AUTH_SECRET: {{ .Values.auth.trusted.secret | quote }}
  {{- end }}
  {{- if $needsClerkSecret }}
  CLERK_SECRET_KEY: {{ .Values.auth.clerk.secretKey | quote }}
  {{- end }}
  {{- if $needsConnectionsKey }}
  CHM_USER_CONNECTIONS_ENCRYPTION_KEY: {{ .Values.secrets.connectionsEncryptionKey | quote }}
  {{- end }}
  {{- if $needsApiKeySecret }}
  CHM_API_KEY_SECRET: {{ .Values.secrets.apiKeySecret | quote }}
  {{- end }}
{{- end }}
