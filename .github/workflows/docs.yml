name: Docs

# Builds the standalone Astro docs app (apps/docs), a custom theme ported from
# jordienr/astro-design-system with per-release versioning. It is intentionally
# outside the root bun workspace (see apps/docs/README.md), so it installs and
# builds on its own rather than via turbo. docs/versions/** holds the committed
# per-release snapshots the site is generated from.

on:
  pull_request:
    paths:
      - 'apps/docs/**'
      - 'docs/content/**'
      - 'docs/versions/**'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'docs/content/**'
      - 'docs/versions/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
