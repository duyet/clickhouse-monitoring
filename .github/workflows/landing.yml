name: Landing

# Builds the standalone Astro landing app (apps/landing). It is intentionally
# outside the root bun workspace (see apps/landing/README.md), so it installs
# and builds on its own rather than via turbo.

on:
  pull_request:
    paths:
      - 'apps/landing/**'
      - '.github/workflows/landing.yml'
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/landing.yml'

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/landing
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
