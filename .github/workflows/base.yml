name: Reusable CI/CD Base

on:
  workflow_call:
    inputs:
      job-type:
        required: true
        type: string
      clickhouse-versions:
        type: string
        description: 'ClickHouse version as JSON array string (e.g. ''["24.5","24.6"]'')'
        default: '["24.5","24.6"]'
      platforms:
        type: string
        description: 'Platform(s) for Docker build (e.g., "linux/amd64,linux/arm64")'
        default: 'linux/amd64'
      push-image:
        type: boolean
        default: false
      load-image:
        type: boolean
        default: false
      test-container:
        type: boolean
        default: false
      image-tag:
        type: string
        description: 'Custom Docker image tag override'

    outputs:
      tags:
        value: ${{ jobs.job.outputs.tags }}
      first_tag:
        value: ${{ jobs.job.outputs.first_tag }}

env:
  CLICKHOUSE_HOST: http://localhost:8123
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ''
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  job:
    name: ${{ inputs.job-type }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      first_tag: ${{ steps.first_tag.outputs.tag }}

    strategy:
      fail-fast: false
      matrix:
        clickhouse-version: ${{ fromJSON(inputs.clickhouse-versions) }}

    services:
      clickhouse:
        image: ghcr.io/duyet/docker-images:clickhouse_${{ matrix.clickhouse-version }}
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/?query=SELECT%201 || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
          --health-start-period 30s
          --env CLICKHOUSE_SKIP_USER_SETUP=1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Next.js Cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: Install dependencies
        run: bun install

      # === Linting ===
      - name: Lint
        if: ${{ inputs.job-type == 'lint' }}
        run: bun run lint

      # === App Build ===
      - name: Build App
        if: ${{ inputs.job-type == 'build' }}
        run: bun run build

      # === Docker Build ===
      - name: Set up QEMU
        if: ${{ inputs.job-type == 'docker' }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: ${{ inputs.job-type == 'docker' }}
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest
        env:
          TMPDIR: /home/runner/work/_temp

      - name: Login to Container registry
        if: ${{ inputs.job-type == 'docker' }}
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ inputs.job-type == 'docker' }}
        id: meta
        uses: docker/metadata-action@85e876bd3a78bcc6b9925c818c482e365cf13b71
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # ========== MAIN BRANCH ==========
            # Branch name ref (e.g., main) - only for main branch pushes
            type=ref,event=branch,suffix={{prefix}},enable=${{ github.ref == 'refs/heads/main' }}
            # Latest stable tag - main branch and stable releases only
            type=raw,value=latest,enable={{is_default_branch}}
            # Edge tag for main branch development builds
            type=raw,value=edge,enable={{is_default_branch}}

            # ========== RELEASES (git tags) ==========
            # Full semantic version (e.g., 1.2.3, 1.2.3-beta.1)
            type=semver,pattern={{version}}
            # Major.Minor version (e.g., 1.2) - stable releases only
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            # Major version only (e.g., 1) - stable releases only
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}

            # ========== PULL REQUESTS ==========
            # PR number for testing (e.g., pr-123)
            type=ref,event=pr,suffix={{prefix}}

            # ========== ALWAYS ==========
            # Short SHA for uniqueness (e.g., sha-f854045f)
            type=sha,prefix=

      - name: Extract first tag
        if: ${{ inputs.job-type == 'docker' && inputs.test-container }}
        id: first_tag
        uses: actions/github-script@v7
        with:
          script: |
            const tags = JSON.parse('${{ steps.meta.outputs.json }}').tags;
            core.setOutput('tag', tags[0]);

      - name: Build and push Docker image
        if: ${{ inputs.job-type == 'docker' }}
        uses: docker/build-push-action@v7
        env:
          TMPDIR: /home/runner/work/_temp
        with:
          push: ${{ inputs.push-image }}
          load: ${{ inputs.load-image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
          # Inline cache for fastest builds (shares cache with pushed image)
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: ${{ inputs.platforms }}

      # === Container Testing ===
      - name: Test container
        if: ${{ inputs.job-type == 'docker' && inputs.test-container }}
        env:
          TAG: ${{ steps.first_tag.outputs.tag }}
        run: |
          docker run -d \
            --name test-app \
            --network host \
            -e CLICKHOUSE_HOST=http://localhost:8123 \
            -e CLICKHOUSE_USER=default \
            -e CLICKHOUSE_PASSWORD="" \
            -e PORT=3000 \
            "$TAG"

          # Wait for container health
          timeout 60 bash -c 'until curl -sSf http://localhost:3000/ > /dev/null 2>&1; do sleep 2; done'

          # Health checks
          curl -sSf http://localhost:3000/ | grep -q "ClickHouse Monitoring"
          curl -sSf http://localhost:3000/api/healthz | grep -q "ok"
          curl -sSf http://localhost:3000/api/version | grep -q "version"
