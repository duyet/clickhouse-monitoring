name: Helm Chart Release (GitHub Pages)

# Packages and publishes changed Helm charts to the gh-pages Helm repo
# (https://duyet.github.io/clickhouse-monitoring) whenever the chart source
# changes on main. chart-releaser detects version bumps in Chart.yaml and
# only re-packages charts that changed since the last published release.
#
# The gh-pages branch is auto-created on first run (see "Bootstrap gh-pages
# branch" step). One manual step remains: enable GitHub Pages serving —
# Settings → Pages → Source = "Deploy from a branch" → Branch: gh-pages / root.
# (This can't be automated: creating a Pages site requires administration:write,
# which the default GITHUB_TOKEN doesn't hold.)
#
# Users install with:
#   helm repo add chmonitor https://duyet.github.io/clickhouse-monitoring
#   helm install my-chm chmonitor/chmonitor --set clickhouse.host=http://ch:8123

on:
  push:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - '.github/cr.yaml'
  # Manual trigger to (re)run chart-releaser without a chart bump — handy for
  # bootstrapping the gh-pages branch. Note: cr index is a no-op when no chart
  # changed, so actually populating index.yaml still requires a Chart.yaml bump.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: chart-releaser
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # chart-releaser's `cr index` clones origin/gh-pages to regenerate
      # index.yaml. On the very first release that branch does not exist yet,
      # and cr fails with `fatal: invalid reference: origin/gh-pages`. Create
      # an empty orphan branch ahead of time so cr always has a branch to clone.
      # Uses commit-tree so the checked-out chart source is never touched.
      - name: Bootstrap gh-pages branch (first run)
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists — skipping bootstrap"
            exit 0
          fi
          echo "gh-pages branch missing — creating empty orphan branch"
          EMPTY_TREE="$(git mktree </dev/null)"
          COMMIT="$(git commit-tree "$EMPTY_TREE" -m "Initialize gh-pages for Helm chart repository")"
          git push origin "$COMMIT:refs/heads/gh-pages"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: deploy/helm
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
