name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

# Cancel in-progress runs for same PR / branch
concurrency:
  group: cloudflare-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  deployments: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Dashboard: TanStack Start dashboard (own lockfile, not in root workspaces)
  # plus the MCP worker. Production: https://dash.chmonitor.dev (on merge to
  # main). Preview: https://preview.dash.chmonitor.dev (on PRs). Mirrors the
  # landing/docs pattern — single job, conditional deploy target.
  # Skipped for forked PRs — deployment secrets must never be exposed to a
  # workflow running PR-controlled code from outside the repository.
  # ──────────────────────────────────────────────────────────────────────────
  dashboard:
    name: dashboard
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-tsr-v1-${{ hashFiles('apps/dashboard/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-tsr-v1-

      - name: Generate OG images
        # Regenerate social-share PNGs from the committed Satori template +
        # vendored fonts (assets/og-fonts). Runs at repo root because the
        # generator's deps (satori, @resvg/resvg-js) live in the root workspace,
        # not apps/dashboard. Output lands in apps/dashboard/public/ and is
        # picked up by the vite build below.
        working-directory: .
        run: |
          bun install --frozen-lockfile
          bun run og:generate

      - name: Install dependencies
        working-directory: apps/dashboard
        run: bun install --frozen-lockfile

      - name: Build for Cloudflare
        # Client-exposed config is build-time inlined via import.meta.env.VITE_*
        # (vite.config.ts CLIENT_ENV). Preview (PR) builds use the Clerk pk_test
        # key; production (push/release) builds use pk_live. Non-secret public
        # keys mirror wrangler.toml / patch-wrangler-env.ts defaults.
        env:
          VITE_AUTH_PROVIDER: clerk
          VITE_CLERK_PUBLISHABLE_KEY: >-
            ${{ github.event_name == 'pull_request'
              && 'pk_test_bWFnbmV0aWMtcmF5LTkwLmNsZXJrLmFjY291bnRzLmRldiQ'
              || 'pk_live_Y2xlcmsuY2htb25pdG9yLmRldiQ' }}
          VITE_GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VITE_GIT_REF: ${{ github.head_ref || github.ref_name }}
          VITE_CI: 'true'
          VITE_DEPLOY_TARGET: cf
        run: bun run build

      - name: Type-check dashboard tests
        # `src/routeTree.gen.ts` is gitignored and generated by the build above;
        # tsc cannot resolve TanStack route types without it, so the test
        # tsconfig type-check must run here (after build) rather than in a
        # standalone job. `src` is already type-checked by `bun run build`.
        run: bun run type-check:test

      - name: Patch wrangler config with env sections
        # Deployment-specific worker vars (ClickHouse host/user/name, OpenRouter
        # referer) are injected here from repo secrets. The committed defaults in
        # patch-wrangler-env.ts / wrangler.toml are public localhost placeholders,
        # so the real homelab topology never lands in the public repo. Falls back
        # to those defaults when a secret is unset.
        env:
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
          CLICKHOUSE_NAME: ${{ secrets.CLICKHOUSE_NAME }}
          OPENROUTER_REFERER: ${{ secrets.OPENROUTER_REFERER }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun scripts/patch-wrangler-env.ts --env preview
          else
            bun scripts/patch-wrangler-env.ts
          fi

      - name: Set secrets
        # Dependabot PRs run with GitHub's isolated dependabot secret store, so
        # the deployment secrets resolve empty and `set-secrets.ts --strict`
        # exits 1 — structurally failing the required `dashboard` check on every
        # dependency PR (#1809). Skip the secret/deploy/verify steps for
        # dependabot; build + type-check above still verify the dependency bump.
        # Production deploys (push to main) are unaffected — actor is never
        # dependabot there.
        if: github.actor != 'dependabot[bot]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_BASE: ${{ secrets.OPENROUTER_API_BASE }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_API_BASE: ${{ secrets.NVIDIA_API_BASE }}
          ANYROUTER_API_KEY: ${{ secrets.ANYROUTER_API_KEY }}
          ANYROUTER_API_BASE: ${{ secrets.ANYROUTER_API_BASE }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_SECRET_KEY_TEST: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          AGENTSTATE_API_KEY: ${{ secrets.AGENTSTATE_API_KEY }}
          # Optional dedicated AgentState key for preview deploys — keeps PR
          # preview conversations out of the prod AgentState project. When unset,
          # preview falls back to a non-AgentState backend (see set-secrets.ts).
          AGENTSTATE_API_KEY_TEST: ${{ secrets.AGENTSTATE_API_KEY_TEST }}
          CHM_API_KEY_SECRET: ${{ secrets.CHM_API_KEY_SECRET }}
          CLICKHOUSE_TZ: ${{ secrets.CLICKHOUSE_TZ || 'UTC' }}
          CLICKHOUSE_EXCLUDE_USER_DEFAULT: ${{ secrets.CLICKHOUSE_EXCLUDE_USER_DEFAULT || '' }}
          NEXT_QUERY_CACHE_TTL: ${{ secrets.NEXT_QUERY_CACHE_TTL || '3600' }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun ../../scripts/set-secrets.ts --from-env --strict --target dashboard --env preview
          else
            bun ../../scripts/set-secrets.ts --from-env --strict --target dashboard
          fi

      - name: Deploy preview
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify

      - name: Deploy production
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify

      - name: Verify deployment
        # Skip for dependabot PRs — no preview was deployed (see Set secrets).
        if: github.actor != 'dependabot[bot]'
        env:
          CHM_API_KEY_SECRET: ${{ secrets.CHM_API_KEY_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="https://preview.dash.chmonitor.dev"
          else
            BASE="https://dash.chmonitor.dev"
          fi
          echo "Verifying $BASE ..."
          # Give the worker a few seconds to propagate after deploy
          sleep 5
          bun scripts/verify-deploy.ts --base-url "$BASE" --hosts 0

      - name: Chart smoke test
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          CHM_API_KEY_SECRET: ${{ secrets.CHM_API_KEY_SECRET }}
        run: |
          echo "Running chart-level smoke test against $BASE ..."
          bun ../../scripts/smoke-test.ts --base-url "$BASE" --json 2>&1 | tee smoke-result.json
          # Parse pass/fail counts for the step summary
          PASSED=$(jq -r '.passed // 0' smoke-result.json 2>/dev/null || echo '?')
          FAILED=$(jq -r '.failed // 0' smoke-result.json 2>/dev/null || echo '?')
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Charts passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Charts failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Informational gate — not blocking deploy. Promote to blocking once baseline is established._" >> $GITHUB_STEP_SUMMARY

      # The dashboard install above is isolated to apps/dashboard. The MCP worker
      # (apps/mcp) bundles @chm/* workspace packages (mcp-server -> clickhouse-client)
      # and zod, which live in the ROOT workspace node_modules — install them here.
      - name: Install MCP worker dependencies (root workspace)
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Set MCP worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CHM_API_KEY_SECRET: ${{ secrets.CHM_API_KEY_SECRET }}
          # Enables Clerk OAuth verification on the MCP worker. set-secrets.ts reads
          # CLERK_SECRET_KEY_TEST first for --env preview (resolveValue), and
          # CLERK_SECRET_KEY for production. Without the verifier the worker has the
          # issuer (pubkey in wrangler.toml) but rejects every Clerk OAuth token.
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_SECRET_KEY_TEST: ${{ secrets.CLERK_SECRET_KEY_TEST }}
        working-directory: apps/mcp
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun ../../scripts/set-secrets.ts --from-env --strict --target mcp --env preview
          else
            bun ../../scripts/set-secrets.ts --from-env --strict --target mcp
          fi

      - name: Deploy MCP worker preview
        if: github.event_name == 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/mcp
        run: |
          npx --yes --package=wrangler@4 wrangler deploy --env preview --minify

      - name: Deploy MCP worker
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/mcp
        run: |
          npx --yes --package=wrangler@4 wrangler deploy --minify

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const timestamp = new Date().toISOString();
            const body = [
              '### ☁️ Cloudflare Preview Deployment',
              '',
              '| App | Preview URL |',
              '|-----|-------------|',
              '| **Dashboard** | https://preview.dash.chmonitor.dev |',
              '| **MCP** | https://preview.dash.chmonitor.dev/api/mcp |',
              '| **Landing** | https://preview.chmonitor.dev |',
              '| **Docs** | https://preview.docs.chmonitor.dev |',
              '',
              `| Property | Value |`,
              `|----------|-------|`,
              `| **Commit** | \`${sha}\` |`,
              `| **Deployed at** | ${timestamp} |`,
              '',
              '> Previews are automatically updated on every push to this PR.',
            ].join('\n');

            // Always create a new comment to preserve deployment history
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Deployment summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### 🚀 Cloudflare Workers Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://dash.chmonitor.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dashboard deployed successfully!" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # Landing (apps/landing): standalone Astro static-assets worker.
  # Built outside the bun workspace (own bun.lock). Production deploys
  # chmonitor-landing (chmonitor.dev apex); PRs deploy preview-chmonitor-landing.
  # ──────────────────────────────────────────────────────────────────────────
  landing:
    name: landing
    # Skip on forked PRs — deploy secrets must not leak to PR-controlled code.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/landing
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Generate OG images
        # Regenerate the social-share PNG (assets/og-fonts is vendored, so this
        # is hermetic). Runs at repo root — the generator's deps live there, not
        # in this standalone Astro app — and writes into this app's public/ dir,
        # which the astro build below copies into dist/.
        working-directory: .
        run: |
          bun install --frozen-lockfile
          bun run og:generate

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --env preview

      - name: Deploy production
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy

  # ──────────────────────────────────────────────────────────────────────────
  # Docs (apps/docs): Fumadocs on TanStack Start, deployed as a CF Worker.
  # Built outside the bun workspace (own bun.lock in apps/docs/). Production
  # deploys chmonitor-docs (docs.chmonitor.dev); PRs deploy preview-chmonitor-docs.
  # Build pipeline: sync-docs.mjs copies docs/content/** → content/docs/ (Fumadocs
  # format), then vite build compiles the TanStack Start app + SSR Worker bundle.
  # ──────────────────────────────────────────────────────────────────────────
  docs:
    name: docs
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --env preview

      - name: Deploy production
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy
