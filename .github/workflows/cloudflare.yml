name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

# Cancel in-progress runs for same PR / branch
concurrency:
  group: cloudflare-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  deployments: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Preview: deploys pull requests to https://preview.chmonitor.dev.
  # Skipped for forked PRs — deployment secrets must never be exposed to a
  # workflow running PR-controlled code from outside the repository.
  # ──────────────────────────────────────────────────────────────────────────
  preview:
    name: preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Extract build metadata
        id: meta
        run: |
          GIT_SHA="${{ github.event.pull_request.head.sha }}"
          echo "git_sha=${GIT_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "git_ref=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "build_timestamp=${BUILD_TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Next.js Cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-preview-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-preview-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: bun install

      - name: Build for Cloudflare
        id: build
        continue-on-error: true
        env:
          NEXT_PUBLIC_GIT_SHA: ${{ steps.meta.outputs.git_sha }}
          NEXT_PUBLIC_GIT_REF: ${{ steps.meta.outputs.git_ref }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ steps.meta.outputs.build_timestamp }}
          NEXT_PUBLIC_CI: "true"
          NEXT_PUBLIC_AUTH_PROVIDER: "clerk"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}
        run: |
          # Update wrangler.toml with the test public key for preview environment
          if [ -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            sed -i "s|^NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = \".*\"|NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = \"$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY\"|g" wrangler.toml
          fi
          bun run cf:build 2>&1 | tee /tmp/build-output.txt
          exit ${PIPESTATUS[0]}

      - name: Set preview secrets
        if: steps.build.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_BASE: ${{ secrets.OPENROUTER_API_BASE }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_API_BASE: ${{ secrets.NVIDIA_API_BASE }}
          ANYROUTER_API_KEY: ${{ secrets.ANYROUTER_API_KEY }}
          ANYROUTER_API_BASE: ${{ secrets.ANYROUTER_API_BASE }}
          CLERK_SECRET_KEY_TEST: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          CLICKHOUSE_TZ: ${{ secrets.CLICKHOUSE_TZ || 'UTC' }}
          CLICKHOUSE_EXCLUDE_USER_DEFAULT: ${{ secrets.CLICKHOUSE_EXCLUDE_USER_DEFAULT || '' }}
          NEXT_QUERY_CACHE_TTL: ${{ secrets.NEXT_QUERY_CACHE_TTL || '3600' }}
        run: |
          set -euo pipefail
          # Set secrets directly to avoid executing PR-controlled scripts with privileged env
          printf '%s' "$CLICKHOUSE_PASSWORD" | npx --yes --package=wrangler@4 wrangler secret put CLICKHOUSE_PASSWORD --env preview
          printf '%s' "$LLM_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put LLM_API_KEY --env preview
          printf '%s' "$LLM_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put LLM_API_BASE --env preview
          printf '%s' "$OPENROUTER_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put OPENROUTER_API_KEY --env preview
          printf '%s' "$OPENROUTER_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put OPENROUTER_API_BASE --env preview
          printf '%s' "$NVIDIA_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put NVIDIA_API_KEY --env preview
          printf '%s' "$NVIDIA_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put NVIDIA_API_BASE --env preview
          printf '%s' "$ANYROUTER_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put ANYROUTER_API_KEY --env preview
          printf '%s' "$ANYROUTER_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put ANYROUTER_API_BASE --env preview
          printf '%s' "$CLERK_SECRET_KEY_TEST" | npx --yes --package=wrangler@4 wrangler secret put CLERK_SECRET_KEY --env preview
          printf '%s' "$CLICKHOUSE_TZ" | npx --yes --package=wrangler@4 wrangler secret put CLICKHOUSE_TZ --env preview
          printf '%s' "$CLICKHOUSE_EXCLUDE_USER_DEFAULT" | npx --yes --package=wrangler@4 wrangler secret put CLICKHOUSE_EXCLUDE_USER_DEFAULT --env preview
          printf '%s' "$NEXT_QUERY_CACHE_TTL" | npx --yes --package=wrangler@4 wrangler secret put NEXT_QUERY_CACHE_TTL --env preview

      - name: Deploy preview to Cloudflare Workers
        id: deploy
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes --package=wrangler@4 wrangler deploy --env preview --minify 2>&1 | tee /tmp/deploy-output.txt
          exit ${PIPESTATUS[0]}

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const previewUrl = 'https://preview.chmonitor.dev';
            const sha = '${{ steps.meta.outputs.git_sha }}';
            const timestamp = '${{ steps.meta.outputs.build_timestamp }}';
            const body = [
              '### ☁️ Cloudflare Preview Deployment',
              '',
              `| Property | Value |`,
              `|----------|-------|`,
              `| **Preview URL** | ${previewUrl} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Deployed at** | ${timestamp} |`,
              '',
              '> This preview is automatically updated on every push to this PR.',
            ].join('\n');

            // Always create a new comment to preserve deployment history
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Comment failure on PR
        if: always() && (steps.build.outcome == 'failure' || steps.deploy.outcome == 'failure')
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const sha = '${{ steps.meta.outputs.git_sha }}';
            const buildOutcome = '${{ steps.build.outcome }}';
            const deployOutcome = '${{ steps.deploy.outcome }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let failedStep, logContent;
            if (buildOutcome === 'failure') {
              failedStep = 'Build (`bun run cf:build`)';
              logContent = fs.existsSync('/tmp/build-output.txt')
                ? fs.readFileSync('/tmp/build-output.txt', 'utf8')
                : 'No build output captured.';
            } else {
              failedStep = 'Deploy (`wrangler deploy --env preview`)';
              logContent = fs.existsSync('/tmp/deploy-output.txt')
                ? fs.readFileSync('/tmp/deploy-output.txt', 'utf8')
                : 'No deploy output captured.';
            }

            // Truncate to last 200 lines to stay within comment size limits
            const lines = logContent.split('\n');
            const truncated = lines.length > 200;
            const tail = lines.slice(-200).join('\n');

            const body = [
              '### ☁️ Cloudflare Preview Deployment — Failed',
              '',
              `| Property | Value |`,
              `|----------|-------|`,
              `| **Failed step** | ${failedStep} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Workflow run** | [View logs](${runUrl}) |`,
              '',
              '<details>',
              '<summary>Error log (click to expand)</summary>',
              '',
              truncated ? `> Showing last 200 of ${lines.length} lines\n` : '',
              '```',
              tail,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Always create a new comment to preserve deployment history
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail job if build or deploy failed
        if: always() && (steps.build.outcome == 'failure' || steps.deploy.outcome == 'failure')
        run: exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Production: deploy on merge to main, releases, or manual trigger
  # ──────────────────────────────────────────────────────────────────────────
  production:
    name: production
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    outputs:
      git_sha: ${{ steps.meta.outputs.git_sha }}
      git_ref: ${{ steps.meta.outputs.git_ref }}
      build_timestamp: ${{ steps.meta.outputs.build_timestamp }}
      deployment_url: ${{ steps.deployment-details.outputs.url }}
      deployment_id: ${{ steps.deployment-details.outputs.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Extract build metadata
        id: meta
        run: |
          GIT_SHA="${{ github.sha }}"
          echo "git_sha=${GIT_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "git_ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "build_timestamp=${BUILD_TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "Git SHA: ${GIT_SHA:0:7}"
          echo "Git Ref: ${{ github.ref_name }}"
          echo "Build Time: ${BUILD_TIMESTAMP}"

      - name: Next.js Cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            .next/static
            .next/server
          key: ${{ runner.os }}-nextjs-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-v1-

      - name: OpenNext Cache
        uses: actions/cache@v5
        with:
          path: .open-next
          key: ${{ runner.os }}-opennext-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-opennext-v1-

      - name: Install dependencies
        run: bun install

      - name: Build for Cloudflare
        env:
          NEXT_PUBLIC_GIT_SHA: ${{ steps.meta.outputs.git_sha }}
          NEXT_PUBLIC_GIT_REF: ${{ steps.meta.outputs.git_ref }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ steps.meta.outputs.build_timestamp }}
          NEXT_PUBLIC_CI: "true"
          NEXT_PUBLIC_AUTH_PROVIDER: "clerk"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          echo "Building with metadata:"
          echo "  SHA: ${NEXT_PUBLIC_GIT_SHA}"
          echo "  Ref: ${NEXT_PUBLIC_GIT_REF}"
          echo "  Time: ${NEXT_PUBLIC_BUILD_TIMESTAMP}"
          # Update wrangler.toml with the production public key
          if [ -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            sed -i "s|^NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = \".*\"|NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = \"$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY\"|g" wrangler.toml
          fi
          bun run cf:build

      - name: Set production secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass secrets required by wrangler secret put
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_BASE: ${{ secrets.OPENROUTER_API_BASE }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_API_BASE: ${{ secrets.NVIDIA_API_BASE }}
          ANYROUTER_API_KEY: ${{ secrets.ANYROUTER_API_KEY }}
          ANYROUTER_API_BASE: ${{ secrets.ANYROUTER_API_BASE }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLICKHOUSE_TZ: ${{ secrets.CLICKHOUSE_TZ || 'UTC' }}
          CLICKHOUSE_EXCLUDE_USER_DEFAULT: ${{ secrets.CLICKHOUSE_EXCLUDE_USER_DEFAULT || '' }}
          NEXT_QUERY_CACHE_TTL: ${{ secrets.NEXT_QUERY_CACHE_TTL || '3600' }}
        run: |
          set -euo pipefail

          printf '%s' "$CLICKHOUSE_PASSWORD" | npx --yes --package=wrangler@4 wrangler secret put CLICKHOUSE_PASSWORD
          printf '%s' "$LLM_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put LLM_API_KEY
          printf '%s' "$LLM_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put LLM_API_BASE
          printf '%s' "$OPENROUTER_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put OPENROUTER_API_KEY
          printf '%s' "$OPENROUTER_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put OPENROUTER_API_BASE
          printf '%s' "$NVIDIA_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put NVIDIA_API_KEY
          printf '%s' "$NVIDIA_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put NVIDIA_API_BASE
          printf '%s' "$ANYROUTER_API_KEY" | npx --yes --package=wrangler@4 wrangler secret put ANYROUTER_API_KEY
          printf '%s' "$ANYROUTER_API_BASE" | npx --yes --package=wrangler@4 wrangler secret put ANYROUTER_API_BASE
          printf '%s' "$CLERK_SECRET_KEY" | npx --yes --package=wrangler@4 wrangler secret put CLERK_SECRET_KEY
          printf '%s' "$CLICKHOUSE_TZ" | npx --yes --package=wrangler@4 wrangler secret put CLICKHOUSE_TZ
          printf '%s' "$CLICKHOUSE_EXCLUDE_USER_DEFAULT" | npx --yes --package=wrangler@4 wrangler secret put CLICKHOUSE_EXCLUDE_USER_DEFAULT
          printf '%s' "$NEXT_QUERY_CACHE_TTL" | npx --yes --package=wrangler@4 wrangler secret put NEXT_QUERY_CACHE_TTL

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        env:
          OPEN_NEXT_DEPLOY: "true"
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --minify

      - name: Extract deployment details
        id: deployment-details
        run: |
          WORKER_NAME=$(grep '^name = ' wrangler.toml | head -n 1 | awk -F'"' '{print $2}')
          WORKER_URL="https://${WORKER_NAME}.duyet.workers.dev"
          echo "url=${WORKER_URL}" >> $GITHUB_OUTPUT

          VERSION_ID=$(wrangler deployments list --json 2>/dev/null | jq -r '.[0].id' || echo "")
          if [ -n "$VERSION_ID" ]; then
            echo "id=${VERSION_ID}" >> $GITHUB_OUTPUT
          fi

          echo "Worker URL: ${WORKER_URL}"
          echo "Version ID: ${VERSION_ID}"

      - name: Deployment summary
        run: |
          echo "### 🚀 Cloudflare Workers Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed clickhouse-monitor**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deployment-details.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.deployment-details.outputs.id }}" ]; then
            echo "| Version ID | \`${{ steps.deployment-details.outputs.id }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Commit | \`${{ steps.meta.outputs.git_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | \`${{ steps.meta.outputs.git_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
