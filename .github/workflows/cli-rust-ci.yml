name: CLI Rust CI

on:
  pull_request:
    paths:
      - 'rust/ch-monitor-cli/**'
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/cli-rust-ci.yml'
  push:
    branches: [main]
    paths:
      - 'rust/ch-monitor-cli/**'
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/cli-rust-ci.yml'

jobs:
  rust-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/ch-monitor-cli
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # ch-monitor-cli is a member of the rust/ Cargo workspace (shared target).
          workspaces: rust -> target
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
      - run: cargo test
