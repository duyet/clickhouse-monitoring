name: CLI Rust CI

on:
  pull_request:
    paths:
      - 'tools/ch-monitor-cli/**'
      - '.github/workflows/cli-rust-ci.yml'
  push:
    branches: [main]
    paths:
      - 'tools/ch-monitor-cli/**'
      - '.github/workflows/cli-rust-ci.yml'

jobs:
  rust-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/ch-monitor-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/ch-monitor-cli -> target
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
      - run: cargo test
