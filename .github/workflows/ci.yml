name: Image build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for same workflow and branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build
    uses: ./.github/workflows/base.yml
    with:
      job-type: build

  lint:
    name: lint
    uses: ./.github/workflows/base.yml
    with:
      job-type: lint

  # Build WASM natively on amd64 — WASM is platform-independent
  build-wasm:
    name: build-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/monitor-core/target
          key: wasm-cargo-${{ runner.os }}-${{ hashFiles('rust/monitor-core/Cargo.lock', 'rust/monitor-core/Cargo.toml') }}
          restore-keys: |
            wasm-cargo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build WASM
        run: bun run wasm:build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-output
          path: |
            lib/wasm/generated/monitor_core.js
            lib/wasm/generated/monitor_core.d.ts
            lib/wasm/generated/monitor_core_bg.wasm
          retention-days: 1

  # PRs: amd64 only for fast feedback (~3-5 min)
  build-docker-pr:
    name: build-docker-pr
    if: github.event_name == 'pull_request'
    needs: [build-wasm]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: false
      skip-rust: true

  # Main/releases: parallel multi-arch builds (~10-15 min total)
  build-docker-amd64:
    name: build-docker-amd64
    if: github.event_name != 'pull_request'
    needs: [build-wasm]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: true
      tag-suffix: -amd64
      skip-rust: true

  # ARM64: cross-compile from AMD64 build artifacts (fast, no QEMU compilation)
  build-docker-arm64:
    name: build-docker-arm64
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-arm64

      - name: Extract build artifacts from AMD64 image
        run: |
          AMD64_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64"
          echo "Pulling AMD64 image: $AMD64_TAG"
          docker pull "$AMD64_TAG"

          # Extract standalone app from AMD64 image
          CONTAINER=$(docker create "$AMD64_TAG")
          mkdir -p /tmp/cross-build
          docker cp "$CONTAINER:/app/." /tmp/cross-build/
          docker rm "$CONTAINER"

          # Create minimal Dockerfile for ARM64 (just copies pre-built JS artifacts)
          cat > /tmp/cross-build/Dockerfile <<'EOFX'
          FROM oven/bun:1-alpine
          WORKDIR /app
          ENV NODE_ENV=production \
              PORT=3000 \
              HOSTNAME="0.0.0.0"
          RUN addgroup --system --gid 1001 app && \
              adduser --system --uid 1001 app
          COPY --chown=app:app . ./
          USER app
          EXPOSE 3000
          CMD ["node", "server.js"]
          EOFX

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: /tmp/cross-build
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

  # Merge multi-arch manifests
  docker-manifest:
    name: docker-manifest
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-,format=long

      - name: Create and push multi-arch manifests
        env:
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          AMD64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64
          ARM64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64

          echo "$TAGS_JSON" | jq -r '.tags[]' | while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
          done

  # Validate only on main/release
  validate-docker:
    name: validate-docker
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["24.5"]'
      platforms: linux/amd64
      load-image: true
      test-container: true
