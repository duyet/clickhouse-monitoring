name: Image build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for same workflow and branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build
    uses: ./.github/workflows/base.yml
    with:
      job-type: build

  lint:
    name: lint
    uses: ./.github/workflows/base.yml
    with:
      job-type: lint

  depcruise:
    name: depcruise
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Install dependencies
        run: bun install

      - name: Validate dependency boundaries
        run: bun run depcruise

  # PRs: amd64 only for fast feedback (~3-5 min)
  build-docker-pr:
    name: build-docker-pr
    if: github.event_name == 'pull_request'
    needs: [build]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: false
      skip-rust: false

  # Main/releases: parallel multi-arch builds (~10-15 min total)
  build-docker-amd64:
    name: build-docker-amd64
    if: github.event_name != 'pull_request'
    needs: [build]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: true
      tag-suffix: -amd64
      skip-rust: false

  # ARM64: cross-compile from AMD64 build artifacts (fast, no QEMU compilation)
  build-docker-arm64:
    name: build-docker-arm64
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-arm64

      - name: Extract build artifacts from AMD64 image
        run: |
          AMD64_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64"
          echo "Pulling AMD64 image: $AMD64_TAG"
          docker pull "$AMD64_TAG"

          # Extract standalone app from AMD64 image
          CONTAINER=$(docker create "$AMD64_TAG")
          mkdir -p /tmp/cross-build
          docker cp "$CONTAINER:/app/." /tmp/cross-build/
          docker rm "$CONTAINER"

          # Create minimal Dockerfile for ARM64 (just copies pre-built JS artifacts)
          cat > /tmp/cross-build/Dockerfile <<'EOFX'
          FROM oven/bun:1-alpine
          WORKDIR /app
          ENV NODE_ENV=production \
              PORT=3000 \
              HOSTNAME="0.0.0.0"
          RUN addgroup --system --gid 1001 app && \
              adduser --system --uid 1001 app
          COPY --chown=app:app . ./
          USER app
          EXPOSE 3000
          CMD ["node", "server.js"]
          EOFX

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: /tmp/cross-build
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

  # Merge multi-arch manifests
  docker-manifest:
    name: docker-manifest
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Publish the multi-arch manifest under BOTH the legacy image name and
          # the new chmonitor brand (matches release.yml). Deployments (kustomize
          # base, Helm chart, Dockerfile, docs) pull ghcr.io/duyet/chmonitor, but
          # IMAGE_NAME (github.repository) is the legacy "clickhouse-monitoring".
          # base.yml already dual-publishes the per-arch images; this mirrors the
          # multi-arch manifest so chmonitor:latest/main/edge/sha move on each
          # push to main. Without it, chmonitor:latest is frozen and the k8s
          # liveness probe (/healthz) 404s on a stale image -> CrashLoopBackOff.
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmonitor
          tags: |
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-,format=long

      - name: Create and push multi-arch manifests
        env:
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          AMD64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64
          ARM64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64

          echo "$TAGS_JSON" | jq -r '.tags[]' | while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
          done

  # Validate only on main/release.
  # Reuse the image build-docker-amd64 already built & pushed instead of
  # rebuilding from scratch — tests the exact artifact that ships, and removes
  # a full redundant image build (~5-10 min) from every main/release run.
  validate-docker:
    name: validate-docker
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read

    services:
      clickhouse:
        image: ghcr.io/duyet/docker-images:clickhouse_24.5
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/?query=SELECT%201 || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
          --health-start-period 30s
          --env CLICKHOUSE_SKIP_USER_SETUP=1

    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt AMD64 image
        run: docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64"

      - name: Test container
        env:
          TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64
        run: |
          docker run -d \
            --name test-app \
            --network host \
            -e CLICKHOUSE_HOST=http://localhost:8123 \
            -e CLICKHOUSE_USER=default \
            -e CLICKHOUSE_PASSWORD="" \
            -e PORT=3000 \
            "$TAG"

          # Wait for container health. On timeout, dump container logs + state so
          # a boot hang is diagnosable instead of a bare "exit code 124" with no
          # clue why / never answered (this step runs under `set -e`).
          if ! timeout 60 bash -c 'until curl -sSf http://localhost:3000/ > /dev/null 2>&1; do sleep 2; done'; then
            echo "::error::test-app did not serve http://localhost:3000/ within 60s"
            docker ps -a --filter name=test-app --format 'table {{.Names}}\t{{.Status}}'
            docker inspect test-app \
              --format 'state={{.State.Status}} exitCode={{.State.ExitCode}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}} error={{.State.Error}}' 2>/dev/null || true
            echo '----- docker logs (last 200 lines) -----'
            docker logs --tail 200 test-app 2>&1 || true
            exit 1
          fi

          # Health checks. Each asserts independently and dumps the response on
          # failure so a broken endpoint is identifiable — a bare `curl | grep`
          # under `set -e` gives no clue which of the three failed (this masked
          # a /api/version contract drift for 8+ runs).
          check() {
            local label="$1" url="$2" needle="$3" follow="${4:-}"
            local body
            if ! body=$(curl -sSf $follow "$url"); then
              echo "::error::$label: request to $url failed"; exit 1
            fi
            if ! grep -q "$needle" <<<"$body"; then
              echo "::error::$label: response from $url missing '$needle'"
              echo "----- body (first 40 lines) -----"; echo "$body" | head -40
              exit 1
            fi
            echo "✓ $label OK"
          }
          # -L: GET / 307-redirects to /?host=0 (host-defaulting); follow it so
          # we grep the rendered shell, not the empty redirect body.
          check "root-shell" http://localhost:3000/ "chmonitor" "-L"
          check "healthz" http://localhost:3000/api/healthz "ok"
          # TSR /api/version returns {"ui":"<app version>"} — the CH version()
          # query was dropped from this endpoint in the TanStack app.
          check "version" http://localhost:3000/api/version '"ui"'
