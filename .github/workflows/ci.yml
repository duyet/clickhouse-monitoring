name: Image build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for same workflow and branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build
    uses: ./.github/workflows/base.yml
    with:
      job-type: build

  lint:
    name: lint
    uses: ./.github/workflows/base.yml
    with:
      job-type: lint

  # Build WASM natively on amd64 — WASM is platform-independent
  build-wasm:
    name: build-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          cache: bun

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/monitor-core/target
          key: wasm-cargo-${{ runner.os }}-${{ hashFiles('rust/monitor-core/Cargo.lock', 'rust/monitor-core/Cargo.toml') }}
          restore-keys: |
            wasm-cargo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build WASM
        run: bun run wasm:build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-output
          path: |
            lib/wasm/generated/monitor_core.js
            lib/wasm/generated/monitor_core.d.ts
            lib/wasm/generated/monitor_core_bg.wasm
          retention-days: 1

  # PRs: amd64 only for fast feedback (~3-5 min)
  build-docker-pr:
    name: build-docker-pr
    if: github.event_name == 'pull_request'
    needs: [build-wasm]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: false
      skip-rust: true

  # Main/releases: parallel multi-arch builds (~10-15 min total)
  build-docker-amd64:
    name: build-docker-amd64
    if: github.event_name != 'pull_request'
    needs: [build-wasm]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: true
      tag-suffix: -amd64
      skip-rust: true

  build-docker-arm64:
    name: build-docker-arm64
    if: github.event_name != 'pull_request'
    needs: [build-wasm]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/arm64
      push-image: true
      tag-suffix: -arm64
      skip-rust: true
      timeout-minutes: 30

  # Merge multi-arch manifests
  docker-manifest:
    name: docker-manifest
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-,format=long

      - name: Create and push multi-arch manifests
        run: |
          AMD64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64
          ARM64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64
          
          # Use metadata-action generated tags
          for TAG in ${{ steps.meta.outputs.tags }}; do
            echo "Creating manifest: $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
          done

  # Validate only on main/release
  validate-docker:
    name: validate-docker
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["24.5"]'
      platforms: linux/amd64
      load-image: true
      test-container: true
