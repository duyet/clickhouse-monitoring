name: Image build and Push

on:
  push:
    branches:
      - main
  release:
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for same workflow and branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build
    uses: ./.github/workflows/base.yml
    with:
      job-type: build

  lint:
    name: lint
    uses: ./.github/workflows/base.yml
    with:
      job-type: lint

  # PRs: amd64 only for fast feedback (~3-5 min)
  build-docker-pr:
    name: build-docker-pr
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: true

  # Main/releases: parallel multi-arch builds (~10-15 min total)
  build-docker-amd64:
    name: build-docker-amd64
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/amd64
      push-image: true

  build-docker-arm64:
    name: build-docker-arm64
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["25.1"]'
      platforms: linux/arm64
      push-image: true

  # Merge multi-arch manifests
  docker-manifest:
    name: docker-manifest
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Login to Container registry
        uses: docker/login-action@v7
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          # Create manifests for common tags (latest, edge, main)
          for TAG in latest edge main; do
            docker buildx imagetools create \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64 || true
          done

  # Validate only on main/release
  validate-docker:
    name: validate-docker
    if: github.event_name != 'pull_request'
    needs: [build-docker-amd64]
    uses: ./.github/workflows/base.yml
    with:
      job-type: docker
      clickhouse-versions: '["24.5"]'
      platforms: linux/amd64
      load-image: true
      test-container: true
