name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for same workflow and branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLICKHOUSE_HOST: http://localhost:8123
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ''
  CLICKHOUSE_SKIP_USER_SETUP: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  id-token: write

jobs:
  # Full Bun test suite with coverage - run first
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # `bun test --isolate` (used by the test scripts to give each file a
          # fresh global, preventing cross-file mock.module leakage) needs a
          # recent Bun.
          bun-version: '1.3.13'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Install dependencies
        run: bun install

      - name: Run Bun tests with coverage
        working-directory: apps/dashboard
        run: bun run test:coverage

      - name: Run workspace package tests with coverage
        run: bun run test:packages

      - name: Upload Bun coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./apps/dashboard/coverage/lcov.info,./coverage/lcov.info
          flags: bun
          fail_ci_if_error: true
          use_oidc: true

  # Cypress component tests cover isolated React/component behavior
  component-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Cypress Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-cypress-v1-

      - name: Install dependencies
        run: bun install

      - name: Run component tests
        working-directory: apps/dashboard
        run: bun run test:component:headless
        env:
          CYPRESS_BROWSER: chrome

  # E2E tests - single browser, latest ClickHouse
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit-tests

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.2
        ports:
          - 8123:8123
        options: >-
          --health-cmd "CLICKHOUSE_SKIP_USER_SETUP=1 wget --no-verbose --tries=1 --spider http://localhost:8123/?query=SELECT%201 || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 10s
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Next.js Cache
        uses: actions/cache@v5
        with:
          path: |
            apps/dashboard/.next/cache
            apps/dashboard/.next/static
            apps/dashboard/.next/server
          key: ${{ runner.os }}-nextjs-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-v1-

      - name: Cypress Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-cypress-v1-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run turbo run build

      - name: Run E2E tests
        working-directory: apps/dashboard
        run: bun run test:e2e:headless
        env:
          CYPRESS_BROWSER: chrome

  # E2E smoke for the TanStack Start app. Builds the Node target and self-serves
  # on localhost (NOT the live edge worker — Cloudflare's bot WAF 403s CI/datacenter
  # IPs). CHM_API_KEY_SECRET enables the /api/v1 auth gate so menu-counts returns
  # 401 before any ClickHouse access — no DB service needed. Non-blocking, like
  # the Next e2e job.
  e2e-test-tsr:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Cypress Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-cypress-v1-

      - name: Install dependencies
        working-directory: apps/dashboard-tsr
        run: bun install

      - name: Build Node target
        working-directory: apps/dashboard-tsr
        run: BUILD_TARGET=node bun run build:node

      - name: Start server + run E2E
        working-directory: apps/dashboard-tsr
        run: |
          node .output/server/index.mjs &
          SERVER_PID=$!
          # Wait up to 60s for the server to accept connections.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health >/dev/null || { echo "server never came up"; kill $SERVER_PID; exit 1; }
          bun run test:e2e:headless
          STATUS=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $STATUS
        env:
          CYPRESS_BROWSER: chrome
          CYPRESS_BASE_URL: http://localhost:3000
          PORT: '3000'
          # Enables the API-key gate so /api/v1/* returns 401 without touching CH.
          CHM_API_KEY_SECRET: ci-e2e-secret
          CHM_AUTH_PROVIDER: none

  # Query config tests - latest ClickHouse only
  test-queries-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.2
        ports:
          - 8123:8123
        options: >-
          --health-cmd "CLICKHOUSE_SKIP_USER_SETUP=1 wget --no-verbose --tries=1 --spider http://localhost:8123/?query=SELECT%201 || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 5s
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1

      keeper:
        image: clickhouse/clickhouse-keeper:26.2
        options: >-
          --health-cmd "clickhouse-keeper client -h 127.0.0.1 -p 9181 -q 'ruok' 2>/dev/null | grep -q imok || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 5s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Install dependencies
        run: bun install

      - name: Test queries config
        working-directory: apps/dashboard
        run: bun run test:query-config
