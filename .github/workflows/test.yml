name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for same workflow and branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CLICKHOUSE_HOST: http://localhost:8123
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ''
  CLICKHOUSE_SKIP_USER_SETUP: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read

jobs:
  # Fast unit tests - run first
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test

  # E2E tests - single browser, latest ClickHouse
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.2
        ports:
          - 8123:8123
        options: >-
          --health-cmd "CLICKHOUSE_SKIP_USER_SETUP=1 wget --no-verbose --tries=1 --spider http://localhost:8123/?query=SELECT%201 || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 10s
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Next.js Cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run E2E tests
        run: bun run e2e:headless
        env:
          CYPRESS_BROWSER: chrome

  # Query config tests - latest ClickHouse only
  test-queries-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.2
        ports:
          - 8123:8123
        options: >-
          --health-cmd "CLICKHOUSE_SKIP_USER_SETUP=1 wget --no-verbose --tries=1 --spider http://localhost:8123/?query=SELECT%201 || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 5s
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1

      keeper:
        image: clickhouse/clickhouse-keeper:25.6
        options: >-
          --health-cmd "clickhouse-keeper client -h 127.0.0.1 -p 9181 -q 'ruok' 2>/dev/null | grep -q imok || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 5s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Test queries config
        run: bun run test:query-config
