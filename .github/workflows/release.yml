name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.2.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  models: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-wasm:
    name: build-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/monitor-core/target
          key: wasm-cargo-${{ runner.os }}-${{ hashFiles('rust/monitor-core/Cargo.lock', 'rust/monitor-core/Cargo.toml') }}
          restore-keys: |
            wasm-cargo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build WASM
        run: bun run wasm:build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-output
          path: |
            apps/web/lib/wasm/generated/monitor_core.js
            apps/web/lib/wasm/generated/monitor_core.d.ts
            apps/web/lib/wasm/generated/monitor_core_bg.wasm
          retention-days: 1

  build-docker-amd64:
    name: build-docker-amd64
    needs: [build-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pre-built WASM
        uses: actions/download-artifact@v8
        with:
          name: wasm-output
          path: apps/web/lib/wasm/generated

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@85e876bd3a78bcc6b9925c818c482e365cf13b71
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-amd64

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v7
        env:
          TMPDIR: /home/runner/work/_temp
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
            SKIP_RUST=true
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,scope=docker-amd64,mode=max
          platforms: linux/amd64

  build-docker-arm64:
    name: build-docker-arm64
    needs: [build-docker-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-arm64

      - name: Extract build artifacts from AMD64 image
        run: |
          AMD64_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64"
          echo "Pulling AMD64 image: $AMD64_TAG"
          docker pull "$AMD64_TAG"

          # Extract standalone app from AMD64 image
          CONTAINER=$(docker create "$AMD64_TAG")
          mkdir -p /tmp/cross-build
          docker cp "$CONTAINER:/app/." /tmp/cross-build/
          docker rm "$CONTAINER"

          # Create minimal Dockerfile for ARM64 (just copies pre-built JS artifacts)
          cat > /tmp/cross-build/Dockerfile <<'EOFX'
          FROM oven/bun:1-alpine
          WORKDIR /app
          ENV NODE_ENV=production \
              PORT=3000 \
              HOSTNAME="0.0.0.0"
          RUN addgroup --system --gid 1001 app && \
              adduser --system --uid 1001 app
          COPY --chown=app:app . ./
          USER app
          EXPOSE 3000
          CMD ["node", "server.js"]
          EOFX

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: /tmp/cross-build
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

  docker-manifest:
    name: docker-manifest
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract release metadata
        id: release_meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
          if [[ "$VERSION" == *-* ]]; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@85e876bd3a78bcc6b9925c818c482e365cf13b71
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release_meta.outputs.version }}
            type=raw,value=${{ steps.release_meta.outputs.minor }},enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=raw,value=${{ steps.release_meta.outputs.major }},enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=raw,value=latest,enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=sha,prefix=sha-

      - name: Create and push multi-arch manifests
        env:
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          AMD64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64
          ARM64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64

          echo "$TAGS_JSON" | jq -r '.tags[]' | while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
          done

  assets:
    name: assets
    needs: docker-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Extract release metadata
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Cloudflare output
        env:
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_GIT_REF: ${{ steps.meta.outputs.tag }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
          NEXT_PUBLIC_CI: "true"
        working-directory: apps/web
        run: bun run cf:build

      - name: Package release archives
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          tar -czf "clickhouse-monitor-${TAG}-standalone.tar.gz" \
            apps/web/.next/standalone \
            apps/web/.next/static \
            apps/web/public \
            apps/web/package.json \
            bun.lock
          tar -czf "clickhouse-monitor-${TAG}-cloudflare.tar.gz" \
            apps/web/.open-next \
            apps/web/wrangler.toml \
            apps/web/package.json \
            bun.lock
          shasum -a 256 "clickhouse-monitor-${TAG}-standalone.tar.gz" "clickhouse-monitor-${TAG}-cloudflare.tar.gz" > SHA256SUMS

      - name: Build AI summary prompt
        id: ai_prompt
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          PREV="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
          if [ -n "$PREV" ]; then RANGE="$PREV..HEAD"; else RANGE="HEAD"; fi
          {
            echo "Summarize the following git commits into concise, user-facing release notes for ClickHouse Monitor ${RELEASE_TAG}."
            echo "Group changes under Features, Fixes, and Other headings using short markdown bullet points."
            echo "Skip noise such as merge commits, version bumps, and formatting-only changes. Do not invent changes."
            echo ""
            echo "Commits:"
            git log --pretty=format:'- %s' "$RANGE"
          } > ai-prompt.txt
          echo "previous_tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate AI summary
        id: ai_summary
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          prompt-file: ai-prompt.txt
          system-prompt: 'You are a release-notes assistant. Output only markdown bullet points grouped by category. Be concise and accurate, and never invent changes that are not in the commit list.'
          model: openai/gpt-4o

      - name: Generate release notes
        env:
          AI_SUMMARY: ${{ steps.ai_summary.outputs.response }}
          PREVIOUS_TAG: ${{ steps.ai_prompt.outputs.previous_tag }}
        run: bun run --silent release:notes > release-notes.md

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ steps.meta.outputs.tag }}
          path: |
            clickhouse-monitor-${{ steps.meta.outputs.tag }}-standalone.tar.gz
            clickhouse-monitor-${{ steps.meta.outputs.tag }}-cloudflare.tar.gz
            SHA256SUMS
            release-notes.md
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          NEW_NOTES="$(cat release-notes.md)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            # Keep prior manual notes, but avoid duplicating the generated block
            # when the release workflow is re-run for the same tag.
            EXISTING="$(gh release view "$TAG" --json body --jq '.body // ""')"
            if [ -n "$EXISTING" ] && [ "${EXISTING#"$NEW_NOTES"}" != "$EXISTING" ]; then
              printf '%s\n' "$EXISTING" > final-notes.md
            elif [ -n "$EXISTING" ]; then
              printf '%s\n\n---\n\n%s\n' "$NEW_NOTES" "$EXISTING" > final-notes.md
            else
              printf '%s\n' "$NEW_NOTES" > final-notes.md
            fi
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file final-notes.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md
          fi

          gh release upload "$TAG" \
            "clickhouse-monitor-${TAG}-standalone.tar.gz" \
            "clickhouse-monitor-${TAG}-cloudflare.tar.gz" \
            SHA256SUMS \
            release-notes.md \
            --clobber
