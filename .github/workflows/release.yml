name: Release

on:
  # Tagging + release creation is owned by release-please (release-please.yml).
  # We fire on the published release it cuts — not on the tag push — to avoid a
  # duplicate run for the same version. workflow_dispatch stays for manual builds.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.2.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  models: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-docker-amd64:
    name: build-docker-amd64
    runs-on: ubuntu-latest
    # 30min was exactly the cold-build wall time → timed out for v0.2.7/v0.2.8.
    # With the shared warm cache this is ~1min; the headroom only matters if the
    # cache was evicted, in which case a slow build should still complete.
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Login to Container registry
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@85e876bd3a78bcc6b9925c818c482e365cf13b71
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-amd64

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v7
        env:
          TMPDIR: /home/runner/work/_temp
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
            SKIP_RUST=true
          # Reuse ci.yml's warm AMD64 layer cache. ci.yml builds on every main
          # push via base.yml with tag-suffix '-amd64', producing the scope
          # 'docker--amd64' (the suffix already carries a leading dash). main is
          # the default branch, so its caches are readable from this tag-pinned
          # release dispatch — turning a cold ~30min build (which timed out for
          # v0.2.7/v0.2.8) into a ~1min warm one.
          cache-from: type=gha,scope=docker--amd64
          cache-to: type=gha,scope=docker--amd64,mode=max
          platforms: linux/amd64

  build-docker-arm64:
    name: build-docker-arm64
    needs: [build-docker-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Login to Container registry
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-arm64

      - name: Extract build artifacts from AMD64 image
        run: |
          AMD64_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64"
          echo "Pulling AMD64 image: $AMD64_TAG"
          docker pull "$AMD64_TAG"

          # Extract standalone app from AMD64 image
          CONTAINER=$(docker create "$AMD64_TAG")
          mkdir -p /tmp/cross-build
          docker cp "$CONTAINER:/app/." /tmp/cross-build/
          docker rm "$CONTAINER"

          # Create minimal Dockerfile for ARM64 (just copies pre-built JS artifacts)
          cat > /tmp/cross-build/Dockerfile <<'EOFX'
          FROM node:24-alpine
          WORKDIR /app
          ENV NODE_ENV=production \
              PORT=3000 \
              HOST="0.0.0.0"
          RUN apk add --no-cache libc6-compat curl && \
              addgroup -S -g 1001 app && \
              adduser -S -u 1001 -G app app && \
              chown -R app:app /app
          COPY --chown=app:app . ./
          USER app
          EXPOSE 3000
          HEALTHCHECK --interval=10s --timeout=5s --retries=3 --start-period=30s \
            CMD curl -sf http://localhost:3000/healthz || exit 1
          CMD ["node", "server/index.mjs"]
          EOFX

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: /tmp/cross-build
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

  docker-manifest:
    name: docker-manifest
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract release metadata
        id: release_meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
          if [[ "$VERSION" == *-* ]]; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Login to Container registry
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@85e876bd3a78bcc6b9925c818c482e365cf13b71
        with:
          # Publish the multi-arch manifest under BOTH the legacy image name and the new
          # chmonitor brand. The legacy clickhouse-monitoring image is kept forever for
          # backward compatibility; the loop below creates manifests for every generated tag.
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmonitor
          tags: |
            type=raw,value=${{ steps.release_meta.outputs.version }}
            type=raw,value=${{ steps.release_meta.outputs.minor }},enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=raw,value=${{ steps.release_meta.outputs.major }},enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=raw,value=latest,enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=sha,prefix=sha-

      - name: Create and push multi-arch manifests
        env:
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          AMD64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64
          ARM64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64

          echo "$TAGS_JSON" | jq -r '.tags[]' | while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
          done

  helm-publish:
    name: helm-publish
    needs: docker-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Extract version
        id: ver
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Sync Chart.yaml to release version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s/^version:.*/version: $VERSION/" deploy/helm/chmonitor/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" deploy/helm/chmonitor/Chart.yaml

      - name: Package chart
        run: helm package deploy/helm/chmonitor --destination /tmp/helm-pkg

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # Push to OCI registry: oci://ghcr.io/duyet/chmonitor
      # Pull with: helm install my-chm oci://ghcr.io/duyet/chmonitor --version X.Y.Z
      - name: Push chart to OCI (GHCR)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          helm push /tmp/helm-pkg/chmonitor-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}

  assets:
    name: assets
    needs: docker-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Extract release metadata
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # apps/dashboard has its own lockfile (not a root workspace member); its
      # vite bundling resolves @chm/* deps from the app's own node_modules, so
      # install in isolation inside apps/dashboard, NOT at the repo root.
      - name: Install dependencies
        working-directory: apps/dashboard
        run: bun install --frozen-lockfile

      # Standalone = the Nitro node-server output (.output). Use the build:node:ci
      # wrapper, NOT a bare vite build: the prerender finishes but the process
      # never exits (nitro's render server leaves a socket open), so a plain
      # `bun run build:node` would hang. The wrapper reaps it once artifacts land.
      - name: Build standalone (Node) output
        env:
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_GIT_REF: ${{ steps.meta.outputs.tag }}
          VITE_CI: "true"
        working-directory: apps/dashboard
        run: bun run build:node:ci

      # Cloudflare = the workerd bundle (dist/) from the default vite build. This
      # target uses @cloudflare/vite-plugin (not nitro) and exits cleanly.
      - name: Build Cloudflare (Workers) output
        env:
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_GIT_REF: ${{ steps.meta.outputs.tag }}
          VITE_CI: "true"
        working-directory: apps/dashboard
        run: bunx vite build

      - name: Package release archives
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          tar -czf "clickhouse-monitor-${TAG}-standalone.tar.gz" \
            apps/dashboard/.output \
            apps/dashboard/package.json \
            apps/dashboard/bun.lock
          tar -czf "clickhouse-monitor-${TAG}-cloudflare.tar.gz" \
            apps/dashboard/dist \
            apps/dashboard/wrangler.toml \
            apps/dashboard/package.json \
            apps/dashboard/bun.lock
          shasum -a 256 "clickhouse-monitor-${TAG}-standalone.tar.gz" "clickhouse-monitor-${TAG}-cloudflare.tar.gz" > SHA256SUMS

      # Centralized release notes: tiered AI summary (Copilot → GitHub Models →
      # AnyRouter), recap stats, Docker pull/FROM block, compare link, and the
      # migration prompt — all from duyet/llm-release-action. It also publishes
      # the GitHub Release body; we attach the build archives below.
      - name: Generate & publish release notes
        uses: duyet/llm-release-action@a44950e3aadd5eeb4d239e843cdd37801bbfc8f7 # v1
        with:
          release-tag: ${{ steps.meta.outputs.tag }}
          project-name: chmonitor
          docker-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          docker-extra-image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmonitor
          notes-prompt-file: .github/release-notes-prompt.md
          system-prompt-file: .github/release-notes-system-prompt.md
          migration-prompt-file: .github/release-migration-prompt.md
          anyrouter-source: chmonitor
          anyrouter-title: CHMonitor
          anyrouter-api-key: ${{ secrets.ANYROUTER_API_KEY }}
          anyrouter-model: ${{ vars.ANYROUTER_MODEL || 'openai/gpt-4o-mini' }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ steps.meta.outputs.tag }}
          path: |
            clickhouse-monitor-${{ steps.meta.outputs.tag }}-standalone.tar.gz
            clickhouse-monitor-${{ steps.meta.outputs.tag }}-cloudflare.tar.gz
            SHA256SUMS
            release-notes.md
          if-no-files-found: error

      - name: Attach build archives to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            "clickhouse-monitor-${TAG}-standalone.tar.gz" \
            "clickhouse-monitor-${TAG}-cloudflare.tar.gz" \
            SHA256SUMS \
            --clobber
