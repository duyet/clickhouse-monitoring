name: Release

on:
  # Tagging + release creation is owned by release-please (release-please.yml).
  # We fire on the published release it cuts — not on the tag push — to avoid a
  # duplicate run for the same version. workflow_dispatch stays for manual builds.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.2.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  models: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-wasm:
    name: build-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/monitor-core/target
          key: wasm-cargo-${{ runner.os }}-${{ hashFiles('rust/monitor-core/Cargo.lock', 'rust/monitor-core/Cargo.toml') }}
          restore-keys: |
            wasm-cargo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build WASM
        run: bun run wasm:build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-output
          path: |
            packages/clickhouse-client/src/wasm/generated/monitor_core.js
            packages/clickhouse-client/src/wasm/generated/monitor_core.d.ts
            packages/clickhouse-client/src/wasm/generated/monitor_core_bg.wasm
          retention-days: 1

  build-docker-amd64:
    name: build-docker-amd64
    needs: [build-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pre-built WASM
        uses: actions/download-artifact@v8
        with:
          name: wasm-output
          path: packages/clickhouse-client/src/wasm/generated

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@85e876bd3a78bcc6b9925c818c482e365cf13b71
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-amd64

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v7
        env:
          TMPDIR: /home/runner/work/_temp
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
            SKIP_RUST=true
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,scope=docker-amd64,mode=max
          platforms: linux/amd64

  build-docker-arm64:
    name: build-docker-arm64
    needs: [build-docker-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long,suffix=-arm64

      - name: Extract build artifacts from AMD64 image
        run: |
          AMD64_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64"
          echo "Pulling AMD64 image: $AMD64_TAG"
          docker pull "$AMD64_TAG"

          # Extract standalone app from AMD64 image
          CONTAINER=$(docker create "$AMD64_TAG")
          mkdir -p /tmp/cross-build
          docker cp "$CONTAINER:/app/." /tmp/cross-build/
          docker rm "$CONTAINER"

          # Create minimal Dockerfile for ARM64 (just copies pre-built JS artifacts)
          cat > /tmp/cross-build/Dockerfile <<'EOFX'
          FROM oven/bun:1-alpine
          WORKDIR /app
          ENV NODE_ENV=production \
              PORT=3000 \
              HOSTNAME="0.0.0.0"
          RUN addgroup --system --gid 1001 app && \
              adduser --system --uid 1001 app
          COPY --chown=app:app . ./
          USER app
          EXPOSE 3000
          CMD ["node", "server.js"]
          EOFX

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: /tmp/cross-build
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

  docker-manifest:
    name: docker-manifest
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract release metadata
        id: release_meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
          if [[ "$VERSION" == *-* ]]; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Login to Container registry
        uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@85e876bd3a78bcc6b9925c818c482e365cf13b71
        with:
          # Publish the multi-arch manifest under BOTH the legacy image name and the new
          # chmonitor brand. The legacy clickhouse-monitoring image is kept forever for
          # backward compatibility; the loop below creates manifests for every generated tag.
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmonitor
          tags: |
            type=raw,value=${{ steps.release_meta.outputs.version }}
            type=raw,value=${{ steps.release_meta.outputs.minor }},enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=raw,value=${{ steps.release_meta.outputs.major }},enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=raw,value=latest,enable=${{ steps.release_meta.outputs.stable == 'true' }}
            type=sha,prefix=sha-

      - name: Create and push multi-arch manifests
        env:
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          AMD64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-amd64
          ARM64=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}-arm64

          echo "$TAGS_JSON" | jq -r '.tags[]' | while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
          done

  assets:
    name: assets
    needs: docker-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Optional AnyRouter fallback for the LLM release-notes summary. The job
      # silently skips it when the secret is absent.
      ANYROUTER_API_KEY: ${{ secrets.ANYROUTER_API_KEY }}
      ANYROUTER_MODEL: ${{ vars.ANYROUTER_MODEL || 'openai/gpt-4o-mini' }}
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun Cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-v1-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-v1-

      - name: Extract release metadata
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Cloudflare output
        env:
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_GIT_REF: ${{ steps.meta.outputs.tag }}
          NEXT_PUBLIC_BUILD_TIMESTAMP: ${{ github.event.repository.updated_at }}
          NEXT_PUBLIC_CI: "true"
        working-directory: apps/dashboard
        run: bun run cf:build

      - name: Package release archives
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          tar -czf "clickhouse-monitor-${TAG}-standalone.tar.gz" \
            apps/dashboard/.next/standalone \
            apps/dashboard/.next/static \
            apps/dashboard/public \
            apps/dashboard/package.json \
            bun.lock
          tar -czf "clickhouse-monitor-${TAG}-cloudflare.tar.gz" \
            apps/dashboard/.open-next \
            apps/dashboard/wrangler.toml \
            apps/dashboard/package.json \
            bun.lock
          shasum -a 256 "clickhouse-monitor-${TAG}-standalone.tar.gz" "clickhouse-monitor-${TAG}-cloudflare.tar.gz" > SHA256SUMS

      - name: Build release recap
        id: recap
        continue-on-error: true
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
          if [ -n "$PREV" ]; then RANGE="$PREV..HEAD"; else RANGE="HEAD"; fi
          RANGE="$RANGE" PREVIOUS_TAG="$PREV" node scripts/release-recap.mjs

      - name: Build AI summary prompt
        id: ai_prompt
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          PREV="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
          if [ -n "$PREV" ]; then RANGE="$PREV..HEAD"; else RANGE="HEAD"; fi
          COMMITS="$(git log --pretty=format:'- %s' "$RANGE")"
          RECAP="$( [ -f recap-facts.txt ] && cat recap-facts.txt || echo 'unavailable' )"
          # Render the tracked template prompt (.github/release-notes-prompt.md)
          # so the changelog style stays consistent and reviewable in-repo.
          TEMPLATE="$(cat .github/release-notes-prompt.md)"
          TEMPLATE="${TEMPLATE//\{\{RELEASE_TAG\}\}/$RELEASE_TAG}"
          TEMPLATE="${TEMPLATE//\{\{RANGE\}\}/$RANGE}"
          TEMPLATE="${TEMPLATE//\{\{RECAP\}\}/$RECAP}"
          printf '%s' "${TEMPLATE//\{\{COMMITS\}\}/$COMMITS}" > ai-prompt.txt
          echo "previous_tag=$PREV" >> "$GITHUB_OUTPUT"
          # Decide whether to append the migration prompt: any non-patch bump
          # (minor/major changed vs the previous tag) or a breaking commit.
          CUR="${RELEASE_TAG#v}"; OLD="${PREV#v}"
          MIGRATION=false
          if [ -z "$PREV" ] || [ "${CUR%.*}" != "${OLD%.*}" ]; then MIGRATION=true; fi
          if git log --pretty=format:'%B' "$RANGE" | grep -qE '(^|\W)BREAKING CHANGE|!:'; then MIGRATION=true; fi
          echo "migration=$MIGRATION" >> "$GITHUB_OUTPUT"

      # LLM-generated summary. Tiered providers, each best-effort so the release
      # never fails on inference: GitHub Copilot → GitHub Models → AnyRouter
      # (the AnyRouter tier only runs when an ANYROUTER_API_KEY secret is set).
      - name: AI summary (GitHub Copilot)
        id: ai_copilot
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          provider: copilot
          model: openai/gpt-4o
          prompt-file: ai-prompt.txt
          system-prompt-file: .github/release-notes-system-prompt.md

      - name: AI summary (GitHub Models)
        id: ai_models
        if: ${{ steps.ai_copilot.outputs.response == '' }}
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          provider: github-models
          model: openai/gpt-4o
          prompt-file: ai-prompt.txt
          system-prompt-file: .github/release-notes-system-prompt.md

      - name: AI summary (AnyRouter fallback)
        id: ai_anyrouter
        if: ${{ steps.ai_copilot.outputs.response == '' && steps.ai_models.outputs.response == '' && env.ANYROUTER_API_KEY != '' }}
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          endpoint: https://anyrouter.dev/api/v1
          token: ${{ secrets.ANYROUTER_API_KEY }}
          model: ${{ env.ANYROUTER_MODEL }}
          prompt-file: ai-prompt.txt
          system-prompt-file: .github/release-notes-system-prompt.md
          # App attribution per AnyRouter docs: stable source slug + title +
          # release version + a valid marketplace category.
          custom-headers: |
            {
              "X-AnyRouter-Source": "chmonitor",
              "X-AnyRouter-Title": "CHMonitor",
              "X-AnyRouter-Version": "${{ steps.meta.outputs.tag }}",
              "X-AnyRouter-Categories": "programming-app"
            }

      - name: Resolve AI summary
        id: ai_summary
        env:
          COPILOT_FILE: ${{ steps.ai_copilot.outputs.response-file }}
          MODELS_FILE: ${{ steps.ai_models.outputs.response-file }}
          ANYROUTER_FILE: ${{ steps.ai_anyrouter.outputs.response-file }}
        run: |
          if [ -n "$COPILOT_FILE" ] && [ -s "$COPILOT_FILE" ]; then
            cp "$COPILOT_FILE" ai-summary.md; PROVIDER=copilot
          elif [ -n "$MODELS_FILE" ] && [ -s "$MODELS_FILE" ]; then
            cp "$MODELS_FILE" ai-summary.md; PROVIDER=github-models
          elif [ -n "$ANYROUTER_FILE" ] && [ -s "$ANYROUTER_FILE" ]; then
            cp "$ANYROUTER_FILE" ai-summary.md; PROVIDER=anyrouter
          else
            : > ai-summary.md; PROVIDER=
          fi
          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        env:
          AI_PROVIDER: ${{ steps.ai_summary.outputs.provider }}
          PREVIOUS_TAG: ${{ steps.ai_prompt.outputs.previous_tag }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DOCKER_EXTRA_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/chmonitor
        run: |
          export AI_SUMMARY="$(cat ai-summary.md)"
          export RECAP_MD="$( [ -f recap.md ] && cat recap.md || echo '' )"
          bun run --silent release:notes > release-notes.md

      - name: Append migration prompt
        if: steps.ai_prompt.outputs.migration == 'true'
        run: |
          # Paste the tracked, paste-able migration prompt into the release body
          # so upgraders get the env-migration helper without leaving the release.
          {
            echo ""
            cat .github/release-migration-prompt.md
          } >> release-notes.md

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ steps.meta.outputs.tag }}
          path: |
            clickhouse-monitor-${{ steps.meta.outputs.tag }}-standalone.tar.gz
            clickhouse-monitor-${{ steps.meta.outputs.tag }}-cloudflare.tar.gz
            SHA256SUMS
            release-notes.md
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          NEW_NOTES="$(cat release-notes.md)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            # Keep prior manual notes, but avoid duplicating the generated block
            # when the release workflow is re-run for the same tag.
            EXISTING="$(gh release view "$TAG" --json body --jq '.body // ""')"
            if [ -n "$EXISTING" ] && [ "${EXISTING#"$NEW_NOTES"}" != "$EXISTING" ]; then
              printf '%s\n' "$EXISTING" > final-notes.md
            elif [ -n "$EXISTING" ]; then
              printf '%s\n\n---\n\n%s\n' "$NEW_NOTES" "$EXISTING" > final-notes.md
            else
              printf '%s\n' "$NEW_NOTES" > final-notes.md
            fi
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file final-notes.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md
          fi

          gh release upload "$TAG" \
            "clickhouse-monitor-${TAG}-standalone.tar.gz" \
            "clickhouse-monitor-${TAG}-cloudflare.tar.gz" \
            SHA256SUMS \
            release-notes.md \
            recap.md \
            --clobber
