name: Labeler

# Auto-label PRs by changed paths so triage and release-note grouping stay
# consistent. Config: .github/labeler.yml

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false
